services:
  backend:
    build:
      context: ./Server
      dockerfile: Dockerfile
    environment:
      DB_URL: ${DB_URL:?DB_URL is required}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./Client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    ports:
      - "3000:80"
    depends_on:
      - backend
